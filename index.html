<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="height=device-height, width=device-width, target-densitydpi=device-dpi, initial-scale=1.0" />

    <link rel="stylesheet" href="https://font.sec.miui.com/font/css?family=MiSans:400,700:MiSans" />
    <link rel="stylesheet" href="./static/css/siderBar.css" />
    <link rel="stylesheet" href="./static/css/floatButton.css" />
    <link rel="stylesheet" href="./static/css/clock.css" />
    <style>
        body {
            font-family: "MiSans", sans-serif;
        }
    </style>
    <title>你似乎来到了网络的荒野...</title>
</head>

<body>
    <input type="checkbox" class="openSidebarMenu" id="openSidebarMenu">
    <label for="openSidebarMenu" class="sidebarIconToggle">
        <div class="spinner diagonal part-1"></div>
        <div class="spinner horizontal"></div>
        <div class="spinner diagonal part-2"></div>
    </label>
    <div id="sidebarMenu">
        <ul class="sidebarMenuInner">
            <li>ObAlpha4<span>Home Page</span></li>
            <li><a href="./pages/Calendar.html">日历</a></li>
            <li><a href="./pages/hole.html">黑洞</a></li>
            <li><a href="#">测试页面</a></li>
        </ul>
    </div>
    </div>
    <div id='center' class="main center">
        <div class="mainInner">
            <div>
                <table>
                    <tbody>
                        <tr style="text-align: right;">
                            <td><span class="clock" id="this_year"></span></td>
                            <td><span style="font-size: 40px;">年</span></td>
                            <td><span class="clock" id="this_month"></span></td>
                            <td><span style="font-size: 40px;">月</span></td>
                            <td><span class="clock" id="this_day"></span></td>
                            <td><span style="font-size: 40px;">日</span></td>
                        </tr>
                        <tr style="text-align: right;">
                            <td><span class="clock" id="this_hour"></span></td>
                            <td><span class="blink">:&nbsp;</span></td>
                            <td><span class="clock" id="this_minute"></span></td>
                            <td><span class="blink">:&nbsp;</span></td>
                            <td><span class="clock" id="this_second"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mainInner">
            <style>
                .rotate-star {
                    display: inline-block;
                    animation: rotate 2s linear infinite;
                }

                @keyframes rotate {
                    from {
                        transform: rotate(0deg);
                    }

                    to {
                        transform: rotate(360deg);
                    }
                }

                p {
                    display: block;
                    font-size: 1.17em;
                    margin-top: 1em;
                    margin-bottom: 1em;
                    margin-left: 0;
                    margin-right: 0;
                }
            </style>
            <script>
                function rotateStar() {
                    const star = document.getElementById("star");
                    star.classList.toggle("rotate-star");
                }
            </script>
            <div>
                <p style="font-size: 1.5em;">Ciallo～(∠・ω< )⌒<span id="star">☆</span></p>
                <p>正在施工中ing...</p>
                <p>等下再来看看吧？</p>
                <button class="fbtn" onclick="rotateStar()">Superise!</button>
            </div>
        </div>
    </div>
    <script src="./static/javascript/getTime.js"></script>
</body>

</html>
