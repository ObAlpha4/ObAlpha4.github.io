<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="UTF-8" />
        <link
            href="https://cdn.staticfile.net/twitter-bootstrap/5.1.1/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <script src="https://cdn.staticfile.net/twitter-bootstrap/5.1.1/js/bootstrap.min.js"></script>
        <script src="../static/javascript/calendar.js"></script>
        <title>Calendar</title>
        <style>
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th,
            td {
                border: 1px solid black;
                text-align: center;
                padding: 5px;
            }
            th {
                background-color: #f2f2f2;
            }
        </style>
    </head>
    <body onload="defaultCalendar()">
        <h1>日历</h1>
        <div class="row">
            <div class="col-2"></div>
            <div class="col-5">
                <div class="mb-3">
                    <label for="year" class="form-label">年份:</label>
                    <input
                        type="number"
                        class="form-control"
                        id="year"
                        name="year"
                        min="1900"
                        max="2100"
                    />
                </div>
                <div class="mb-3">
                    <label for="month" class="form-label">月份:</label>
                    <input
                        type="number"
                        class="form-control"
                        id="month"
                        name="month"
                        min="1"
                        max="12"
                    />
                </div>
                <button class="btn btn-primary" onclick="updateCalendar()">
                    更新日历
                </button>
            </div>
            <div class="col-5"></div>
        </div>
        <div class="mx-auto" style="width: 200px">
            <p></p>
        </div>
        <div class="row">
            <div class="col-1"></div>
            <div class="col-10">
                <div id="calendar"></div>
            </div>
            <div class="col-1"></div>
        </div>
    </body>
</html>
