<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.staticfile.net/twitter-bootstrap/5.1.1/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.staticfile.net/twitter-bootstrap/5.1.1/js/bootstrap.min.js"></script>
    <script src="../static/javascript/calendar.js"></script>

    <title>日历</title>
</head>

<body onload="defaultCalendar()">
    <nav class="navbar navbar-expand-sm bg-light fixed-top">
        <div class="navbar navbar-expand-sm">
            <div class="row">
                <div class="mx-auto" style="width: 30px;">
                    <p></p>
                </div>
                <div class="col">
                    <ul class="nav nav-pills">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">主页</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./Calendar.html">日历</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="mx-auto" style="height: 50px">
        <p></p>
    </div>

    <div class="row">
        <div class="col-md-1 col-lg-2"></div>
        <div class="col-md-4 col-lg-3">
            <label for="year" class="form-label">年份:</label>
            <input type="number" class="form-control" id="year" name="year" min="-271821" max="275759" />
            <!-- 别问为什么是这两个值，问就是我自己试出来的 -->
            <script>
                pressEnter_year();
            </script>
        </div>
        <div class="col-md-4 col-lg-3">
            <label for="month" class="form-label">月份:</label>
            <input type="number" class="form-control" id="month" name="month" min="1" max="12" />
            <script>
                pressEnter_month();
            </script>
        </div>
        <div class="col-md-2 col-lg-2">
            <div class="mx-auto" style="height: 31px"></div>
            <button class="btn btn-primary" onclick="updateCalendar()">
                查询日历
            </button>
        </div>
        <div class="col-md-1 col-lg-2"></div>
    </div>

    <div class="mx-auto" style="height: 25px">
        <p></p>
    </div>

    <div class="row">
        <div class="col-2"></div>
        <div class="col-8">
            <div id="monthString"></div>
            <div id="calendar"></div>
        </div>
        <div class="col-2"></div>
    </div>
</body>

</html>
