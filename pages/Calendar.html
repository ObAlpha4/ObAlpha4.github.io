<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="UTF-8" />
        <link
            href="https://cdn.staticfile.net/twitter-bootstrap/5.1.1/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <script src="https://cdn.staticfile.net/twitter-bootstrap/5.1.1/js/bootstrap.min.js"></script>
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="../static/javascript/calendar.js"></script>

        <style>
            .today {
                background-color: yellow;
                font-weight: bold;
            }
        </style>

        <title>Calendar</title>
    </head>

    <body onload="defaultCalendar()">
        <nav class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
            <div class="navbar navbar-expand-sm">
                <div>
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">主页</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./RainbowDigitClock.html"
                                >霓虹数字时钟</a
                            >
                        </li>
                        <li class="nav-item">
                            <a
                                class="nav-link text-primary"
                                href="./Calendar.html"
                                >日历</a
                            >
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="mx-auto" style="height: 100px">
            <p></p>
        </div>

        <div class="row">
            <div class="col-2"></div>
            <div class="col-3">
                <div class="mb-2">
                    <label for="year" class="form-label">年份:</label>
                    <input
                        type="number"
                        class="form-control"
                        id="year"
                        name="year"
                        min="1900"
                        max="2100"
                    />
                </div>
            </div>
            <div class="col-3">
                <div class="mb-2">
                    <label for="month" class="form-label">月份:</label>
                    <input
                        type="number"
                        class="form-control"
                        id="month"
                        name="month"
                        min="1"
                        max="12"
                    />
                </div>
                <script>
                    document
                        .getElementById("month")
                        .addEventListener("keydown", function (event) {
                            if (event.key === "Enter") {
                                updateCalendar();
                            }
                        });
                </script>
            </div>
            <div class="col-2">
                <div class="mx-auto" style="height: 31px"></div>
                <button class="btn btn-primary" onclick="updateCalendar()">
                    查询日历
                </button>
            </div>
            <div class="col-2"></div>
        </div>

        <div class="mx-auto" style="height: 25px">
            <p></p>
        </div>

        <div class="row">
            <div class="col-2"></div>
            <div class="col-8">
                <div id="monthString"></div>
                <div id="calendar"></div>
            </div>
            <div class="col-2"></div>
        </div>
    </body>
</html>
