<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        canvas {
            background-color: #000;
            display: block;
            margin: 20px auto;
            border: 2px solid #fff;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const box = 20; // 每个方块的大小
        let snake = [{ x: 9 * box, y: 9 * box }]; // 贪吃蛇的初始位置
        let direction = null; // 当前方向
        let food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box }; // 食物位置
        let score = 0; // 分数

        document.addEventListener('keydown', directionControl);

        function directionControl(event) {
            if (event.key === 'ArrowUp' && direction !== 'DOWN') {
                direction = 'UP';
            }
            if (event.key === 'ArrowDown' && direction !== 'UP') {
                direction = 'DOWN';
            }
            if (event.key === 'ArrowLeft' && direction !== 'RIGHT') {
                direction = 'LEFT';
            }
            if (event.key === 'ArrowRight' && direction !== 'LEFT') {
                direction = 'RIGHT';
            }
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x === array[i].x && head.y === array[i].y) {
                    return true;
                }
            }
            return false;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制食物
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, box, box);

            // 绘制蛇
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? 'green' : 'white'; // 蛇头颜色为绿色
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            // 蛇的移动
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (direction === 'UP') snakeY -= box;
            if (direction === 'DOWN') snakeY += box;
            if (direction === 'LEFT') snakeX -= box;
            if (direction === 'RIGHT') snakeX += box;

            // 增长蛇身
            if (snakeX === food.x && snakeY === food.y) {
                score++;
                food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
            } else {
                snake.pop(); // 移除蛇尾
            }

            const newHead = { x: snakeX, y: snakeY };

            // 判断游戏结束
            if (snakeX < 0 || snakeY < 0 || snakeX >= canvas.width || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert('游戏结束！得分：' + score);
                return;
            }

            snake.unshift(newHead); // 添加新头
        }

        const game = setInterval(draw, 100); // 每100毫秒绘制一次
    </script>
</body>

</html>
